<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Budgeting dashboard illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fbfbfd"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.70"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- Soft blobs -->
  <circle cx="260" cy="240" r="180" fill="#ff4d9d" fill-opacity="0.10"/>
  <circle cx="980" cy="250" r="220" fill="#0b1f3a" fill-opacity="0.06"/>
  <circle cx="760" cy="760" r="240" fill="#ffb9dc" fill-opacity="0.18"/>

  <!-- Main card -->
  <g filter="url(#shadow)">
    <rect x="160" y="160" width="880" height="560" rx="34" fill="url(#card)" stroke="#0f172a" stroke-opacity="0.10"/>
    <rect x="160" y="160" width="880" height="84" rx="34" fill="#ffffff" fill-opacity="0.85"/>
    <path d="M194 206h210" stroke="#0f172a" stroke-opacity="0.12" stroke-width="10" stroke-linecap="round"/>
    <circle cx="980" cy="202" r="18" fill="#ff4d9d" fill-opacity="0.18"/>
    <circle cx="930" cy="202" r="18" fill="#0b1f3a" fill-opacity="0.12"/>
  </g>

  <!-- Budget donut -->
  <g>
    <circle cx="360" cy="420" r="120" fill="none" stroke="#0f172a" stroke-opacity="0.08" stroke-width="34"/>
    <path d="M360 300 a120 120 0 0 1 104 60" fill="none" stroke="#0b1f3a" stroke-opacity="0.78" stroke-width="34" stroke-linecap="round"/>
    <path d="M464 360 a120 120 0 0 1 -32 160" fill="none" stroke="#ff4d9d" stroke-opacity="0.80" stroke-width="34" stroke-linecap="round"/>
    <path d="M432 520 a120 120 0 0 1 -164 -40" fill="none" stroke="#ffb9dc" stroke-opacity="0.80" stroke-width="34" stroke-linecap="round"/>
    <text x="360" y="420" text-anchor="middle" font-size="28" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#0f172a" fill-opacity="0.82">This month</text>
    <text x="360" y="458" text-anchor="middle" font-size="42" font-weight="700" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#0f172a" fill-opacity="0.90">$2,140</text>
  </g>

  <!-- Bar chart -->
  <g>
    <rect x="540" y="320" width="420" height="260" rx="22" fill="#ffffff" fill-opacity="0.88" stroke="#0f172a" stroke-opacity="0.10"/>
    <path d="M578 370h210" stroke="#0f172a" stroke-opacity="0.10" stroke-width="10" stroke-linecap="round"/>
    <path d="M578 404h150" stroke="#0f172a" stroke-opacity="0.08" stroke-width="8" stroke-linecap="round"/>

    <g>
      <rect x="592" y="520" width="34" height="36" rx="10" fill="#0b1f3a" fill-opacity="0.30"/>
      <rect x="642" y="486" width="34" height="70" rx="10" fill="#0b1f3a" fill-opacity="0.36"/>
      <rect x="692" y="450" width="34" height="106" rx="10" fill="#ff4d9d" fill-opacity="0.58"/>
      <rect x="742" y="470" width="34" height="86" rx="10" fill="#0b1f3a" fill-opacity="0.30"/>
      <rect x="792" y="430" width="34" height="126" rx="10" fill="#ff4d9d" fill-opacity="0.46"/>
      <rect x="842" y="500" width="34" height="56" rx="10" fill="#0b1f3a" fill-opacity="0.26"/>
    </g>

    <path d="M592 566h284" stroke="#0f172a" stroke-opacity="0.12" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Category chips -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#0f172a" fill-opacity="0.86">
    <g>
      <rect x="240" y="610" width="220" height="54" rx="18" fill="#ffffff" fill-opacity="0.88" stroke="#0f172a" stroke-opacity="0.10"/>
      <circle cx="270" cy="637" r="9" fill="#ff4d9d" fill-opacity="0.70"/>
      <text x="292" y="643" font-size="18">Groceries</text>
      <text x="420" y="643" font-size="18" text-anchor="end" fill-opacity="0.72">$312</text>
    </g>
    <g>
      <rect x="480" y="610" width="220" height="54" rx="18" fill="#ffffff" fill-opacity="0.88" stroke="#0f172a" stroke-opacity="0.10"/>
      <circle cx="510" cy="637" r="9" fill="#0b1f3a" fill-opacity="0.55"/>
      <text x="532" y="643" font-size="18">Bills</text>
      <text x="660" y="643" font-size="18" text-anchor="end" fill-opacity="0.72">$980</text>
    </g>
    <g>
      <rect x="720" y="610" width="220" height="54" rx="18" fill="#ffffff" fill-opacity="0.88" stroke="#0f172a" stroke-opacity="0.10"/>
      <circle cx="750" cy="637" r="9" fill="#ffb9dc" fill-opacity="0.85"/>
      <text x="772" y="643" font-size="18">Dining</text>
      <text x="900" y="643" font-size="18" text-anchor="end" fill-opacity="0.72">$148</text>
    </g>
  </g>
</svg>

