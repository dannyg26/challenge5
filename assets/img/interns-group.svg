  <g fill="#0f172a" fill-opacity="0.62" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" text-anchor="middle">
    <text x="600" y="135" font-size="30" letter-spacing="0.3">Replace with interns group photo</text>
    <text x="600" y="175" font-size="18">assets/img/interns-group.jpg</text>
