<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="825" viewBox="0 0 1200 825" role="img" aria-label="Interns group photo placeholder">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1f3a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ff4d9d" stop-opacity="0.14"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fbfbfd"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="825" fill="url(#bg)"/>
  <rect x="54" y="54" width="1092" height="717" rx="36" fill="url(#g)" stroke="#0f172a" stroke-opacity="0.10"/>

  <!-- Simple “group” silhouettes -->
  <g fill="#0f172a" fill-opacity="0.14">
    <circle cx="455" cy="360" r="70"/>
    <circle cx="600" cy="330" r="84"/>
    <circle cx="745" cy="360" r="70"/>
    <path d="M290 705c28-150 150-235 310-235s282 85 310 235" />
